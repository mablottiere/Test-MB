<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pour toi</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #fff0f5;
      color: #333;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      max-width: 600px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    h1 {
      font-size: 2.2em;
      margin-bottom: 20px;
      color: #d63384;
    }

    p {
      font-size: 1.2em;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    button {
      background: #d63384;
      color: white;
      border: none;
      padding: 12px 22px;
      font-size: 1em;
      border-radius: 999px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #extra {
      display: none;
      margin-top: 20px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Pour toi ❤️</h1>
    <p>
      Je veux juste te dire une chose simple : je t'aime,
      et je trouve que tu es incroyablement forte.
    </p>
    <p>
      Même quand tu doutes, moi je vois à quel point tu es courageuse,
      belle et précieuse.
    </p>
    <button onclick="document.getElementById('extra').style.display='block'">
      Clique ici
    </button>
    <p id="extra">
      Je suis fier de toi. Toujours. ❤️
    </p>
  </div>
</body>
</html>
